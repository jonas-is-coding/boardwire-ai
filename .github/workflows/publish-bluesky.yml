name: Boardwire Publish Bluesky

on:
  # 3x daily, 1h after each collect-llm run.
  # 06:00, 12:00, 18:00 UTC = 07/13/19 CET (winter) or 08/14/20 CEST (summer).
  # Per-run cap is 1 (BOARDWIRE_MAX_PUBLISH_PER_RUN, default 1) → 3 posts/day.
  # The publish loop picks the newest approved item; stale ones (>48h) expire.
  schedule:
    - cron: "0 6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish_bluesky:
    runs-on: ubuntu-latest
    environment: production
    env:
      BOARDWIRE_PUBLISHER: bluesky
      BOARDWIRE_REAL_PUBLISH_ENABLED: true
      BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
      BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      BOARDWIRE_SARAH_PROVIDER: openrouter
      BOARDWIRE_SARAH_MODEL: qwen/qwen3-235b-a22b:free
      BOARDWIRE_SARAH_FALLBACK_MODEL: deepseek/deepseek-chat-v3-0324:free
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
      SLACK_WEBHOOK_URL_CLAIRE: ${{ secrets.SLACK_WEBHOOK_URL_CLAIRE }}
      SLACK_WEBHOOK_URL_CHLOE: ${{ secrets.SLACK_WEBHOOK_URL_CHLOE }}
      SLACK_WEBHOOK_URL_MADISON: ${{ secrets.SLACK_WEBHOOK_URL_MADISON }}
      SLACK_WEBHOOK_URL_SARAH: ${{ secrets.SLACK_WEBHOOK_URL_SARAH }}
      SLACK_WEBHOOK_URL_DEBUG: ${{ secrets.SLACK_WEBHOOK_URL_DEBUG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Publish approved to Bluesky (real)
        run: python -m src.main --publish-approved --publisher bluesky --confirm-real-publish

      - name: Commit publishing state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/published_posts.json data/review_queue.json reports/review_queue.md

          if git diff --cached --quiet; then
            echo "No publish state changes to commit"
          else
            git commit -m "chore: update bluesky published posts"
            git push
          fi
