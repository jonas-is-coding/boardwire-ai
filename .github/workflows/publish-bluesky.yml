name: Boardwire Publish Bluesky

on:
  # Post into the Bluesky engagement windows instead of spraying every 2h into
  # dead air. The Discover feed rewards early engagement velocity; best windows
  # are Tue-Thu 9-11 AM and 1-3 PM US Eastern plus a Sunday-evening spike.
  # GitHub cron is UTC and can fire up to ~15-30 min late (acceptable).
  # NOTE: these times assume US Eastern DAYLIGHT time (EDT, UTC-4). In US
  # winter (EST, UTC-5) shift each cron +1h to stay inside the windows.
  schedule:
    # Weekdays 13:30 UTC = 9:30 AM US Eastern (EDT) — strongest morning window (Tue–Thu peak)
    - cron: "30 13 * * 1-5"
    # Weekdays 17:30 UTC = 1:30 PM US Eastern — midday window
    - cron: "30 17 * * 1-5"
    # Sunday 22:00 UTC = 6 PM US Eastern — Sunday-evening spike
    - cron: "0 22 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish_bluesky:
    runs-on: ubuntu-latest
    environment: production
    env:
      BOARDWIRE_PUBLISHER: bluesky
      BOARDWIRE_REAL_PUBLISH_ENABLED: true
      BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
      BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
      SLACK_WEBHOOK_URL_CLAIRE: ${{ secrets.SLACK_WEBHOOK_URL_CLAIRE }}
      SLACK_WEBHOOK_URL_CHLOE: ${{ secrets.SLACK_WEBHOOK_URL_CHLOE }}
      SLACK_WEBHOOK_URL_MADISON: ${{ secrets.SLACK_WEBHOOK_URL_MADISON }}
      SLACK_WEBHOOK_URL_SARAH: ${{ secrets.SLACK_WEBHOOK_URL_SARAH }}
      SLACK_WEBHOOK_URL_DEBUG: ${{ secrets.SLACK_WEBHOOK_URL_DEBUG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Publish approved to Bluesky (real)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: python -m src.main --publish-approved --publisher bluesky --confirm-real-publish

      - name: Commit publishing state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/published_posts.json data/review_queue.json reports/review_queue.md articles/ data/published_releases.json data/gate_rejections.json

          if git diff --cached --quiet; then
            echo "No publish state changes to commit"
          else
            git commit -m "chore: update bluesky published posts"

            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi

              echo "Push failed on attempt ${attempt}; rebasing onto latest ${GITHUB_REF_NAME} before retrying"
              git fetch origin "${GITHUB_REF_NAME}"
              git rebase "origin/${GITHUB_REF_NAME}"
            done

            echo "Push failed after 3 attempts" >&2
            exit 1
          fi
