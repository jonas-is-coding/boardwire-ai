name: Boardwire Publish Dry Run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish_dry_run:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      BOARDWIRE_SARAH_PROVIDER: openrouter
      BOARDWIRE_SARAH_MODEL: deepseek/deepseek-v4-flash:free
      BOARDWIRE_SARAH_FALLBACK_MODEL: minimax/minimax-m2.5:free
      BOARDWIRE_SARAH_EMERGENCY_MODEL: openrouter/free
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
      SLACK_WEBHOOK_URL_CLAIRE: ${{ secrets.SLACK_WEBHOOK_URL_CLAIRE }}
      SLACK_WEBHOOK_URL_CHLOE: ${{ secrets.SLACK_WEBHOOK_URL_CHLOE }}
      SLACK_WEBHOOK_URL_MADISON: ${{ secrets.SLACK_WEBHOOK_URL_MADISON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Publish approved in dry-run mode
        run: python -m src.main --publish-approved --publisher dry_run

      - name: Commit publishing state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/published_posts.json data/review_queue.json reports/review_queue.md

          if git diff --cached --quiet; then
            echo "No publish state changes to commit"
          else
            git commit -m "chore: update dry-run published posts"
            git push
          fi
