name: Boardwire Publish Dry Run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish_dry_run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Publish approved in dry-run mode
        run: python -m src.main --publish-approved --publisher dry_run

      - name: Commit publishing state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/published_posts.json data/review_queue.json reports/review_queue.md

          if git diff --cached --quiet; then
            echo "No publish state changes to commit"
          else
            git commit -m "chore: update dry-run published posts"
            git push
          fi
