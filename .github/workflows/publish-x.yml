name: Boardwire Publish X

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish_x:
    runs-on: ubuntu-latest
    environment: production
    env:
      BOARDWIRE_PUBLISHER: x
      BOARDWIRE_REAL_PUBLISH_ENABLED: true
      X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
      X_CONSUMER_KEY_SECRET: ${{ secrets.X_CONSUMER_KEY_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Publish approved to X (real)
        run: python -m src.main --publish-approved --publisher x --confirm-real-publish

      - name: Commit publishing state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/published_posts.json data/review_queue.json reports/review_queue.md

          if git diff --cached --quiet; then
            echo "No publish state changes to commit"
          else
            git commit -m "chore: update x published posts"
            git push
          fi

