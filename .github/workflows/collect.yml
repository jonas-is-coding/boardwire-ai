name: Boardwire Collect

on:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run collection with review mode
        run: python -m src.main --limit 5 --review --llm-provider none

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/drafts.json data/seen_items.json data/review_queue.json reports/review_queue.md

          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: update collected drafts and review queue"
            git push
          fi
