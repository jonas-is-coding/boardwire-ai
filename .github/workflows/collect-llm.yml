name: Boardwire Collect with LLM

on:
  # Every 2 hours (even hours UTC) so the channel stays current and a
  # fast-developing story is picked up within ~2h instead of waiting for one
  # of 3 daily slots. The daily *publish* budget still caps routine output;
  # only breaking-news items (high score + corroboration) may exceed it.
  # Publish workflow runs on the odd hours, ~1h after each collect.
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "How many newest unseen items to process"
        required: false
        default: "8"
      max_llm_items:
        description: "Maximum items evaluated by LLM"
        required: false
        default: "4"
      max_posts_per_day:
        description: "Maximum approved posts allowed per day (collection-side cap)"
        required: false
        default: "10"
      llm_provider:
        description: "LLM provider to use"
        required: false
        default: "gemini"
        type: choice
        options:
          - gemini
          - openai
          - none

permissions:
  contents: write

concurrency:
  group: boardwire-collect-llm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect_llm:
    runs-on: ubuntu-latest
    env:
      BOARDWIRE_LLM_PROVIDER: ${{ inputs.llm_provider || 'gemini' }}
      BOARDWIRE_MAX_LLM_ITEMS: ${{ inputs.max_llm_items || '4' }}
      BOARDWIRE_MAX_POSTS_PER_DAY: ${{ inputs.max_posts_per_day || '10' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      SLACK_WEBHOOK_URL_CLAIRE: ${{ secrets.SLACK_WEBHOOK_URL_CLAIRE }}
      SLACK_WEBHOOK_URL_CHLOE: ${{ secrets.SLACK_WEBHOOK_URL_CHLOE }}
      SLACK_WEBHOOK_URL_MADISON: ${{ secrets.SLACK_WEBHOOK_URL_MADISON }}
      SLACK_WEBHOOK_URL_SARAH: ${{ secrets.SLACK_WEBHOOK_URL_SARAH }}
      SLACK_WEBHOOK_URL_DEBUG: ${{ secrets.SLACK_WEBHOOK_URL_DEBUG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache local model weights (embeddings + reranker)
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-${{ runner.os }}-bge-small-reranker-minilm

      - name: Run LLM collection with review mode
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          BW_LIMIT: ${{ inputs.limit || '8' }}
          BW_MAX_LLM_ITEMS: ${{ inputs.max_llm_items || '4' }}
          BW_MAX_POSTS_PER_DAY: ${{ inputs.max_posts_per_day || '10' }}
          BW_LLM_PROVIDER: ${{ inputs.llm_provider || 'gemini' }}
        run: |
          python -m src.main \
            --limit "$BW_LIMIT" \
            --llm-provider "$BW_LLM_PROVIDER" \
            --max-llm-items "$BW_MAX_LLM_ITEMS" \
            --max-posts-per-day "$BW_MAX_POSTS_PER_DAY" \
            --review --quality-report

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/drafts.json data/seen_items.json data/review_queue.json reports/review_queue.md

          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: update LLM-collected drafts and review queue"

            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi

              echo "Push failed on attempt ${attempt}; rebasing onto latest ${GITHUB_REF_NAME} before retrying"
              git fetch origin "${GITHUB_REF_NAME}"
              git rebase "origin/${GITHUB_REF_NAME}"
            done

            echo "Push failed after 3 attempts" >&2
            exit 1
          fi
